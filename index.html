<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Christopher Demetri Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-layer"></div>
  <div id="sparkle-background" aria-hidden="true"></div>
  <!-- Redirect root to land.html so the landing screen is the first thing visitors see -->
  <script>
    (function() {
      const params = new URLSearchParams(location.search);
      const skip = params.has('skipLand');
      const ref = document.referrer || '';
      const onRoot = location.pathname === '/' || /index\.html?$/.test(location.pathname);
      if (onRoot && !skip && !/land\.html/.test(ref)) {
        location.replace('land.html');
      }
    })();
  </script>
  <header class="topbar">
    <div class="profile-block">
      <div class="profile-icon">CD</div>
      <div>
        <div class="profile-name">Christopher Demetri</div>
        <div class="profile-sub">Senior Portfolio</div>
      </div>
    </div>
    <div class="topbar-right">
      <a class="topbar-button" href="about.html">About Me Page</a>
      <div class="status-block">
        <div class="status-chip" id="status-datetime" aria-live="polite"></div>
      </div>
    </div>
  </header>

  <main class="home-screen">
    <section class="xmb-panel">
      <div class="xmb-detail">
        <div class="xmb-hero">Projects</div>
        <div class="xmb-copy">Click a year below to view only the project details for that year.</div>
      </div>

      <div class="xmb-row" role="list">
        <button class="xmb-item" data-year="sophomore" aria-selected="false" role="listitem">
          <span class="xmb-icon">S</span>
          <span class="xmb-label">Sophomore</span>
        </button>
        <button class="xmb-item" data-year="junior" aria-selected="false" role="listitem">
          <span class="xmb-icon">J</span>
          <span class="xmb-label">Junior</span>
        </button>
        <button class="xmb-item" data-year="senior" aria-selected="false" role="listitem">
          <span class="xmb-icon">S</span>
          <span class="xmb-label">Senior</span>
        </button>
      </div>
    </section>

    <section class="project-grid">
      <article class="project-card" data-year="sophomore">
        <h2>SOPHOMORE YEAR</h2>
        <div class="project-countdown"></div>
      </article>

      <article class="project-card" data-year="junior">
        <h2>JUNIOR YEAR</h2>
        <div class="project-images"></div>
      </article>

      <article class="project-card" data-year="senior">
        <h2>SENIOR YEAR</h2>
        <div class="project-images"></div>
      </article>
    </section>
  </main>

  <footer class="footer-bar">Use left / right arrow keys or click icons. Press Enter to open the selected year.</footer>

  <script src="script.js"></script>
</body>
</html>
